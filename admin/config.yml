backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads" # Where their uploaded photos will go
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog" # This targets your existing blog folder
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Portfolio Projects"
    folder: "data/projects"
    create: true
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Link to Case Study", name: "link", widget: "string" }