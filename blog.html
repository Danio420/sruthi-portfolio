<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Sruthi Ajith</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <script>
    (function () {
      const saved = localStorage.getItem("theme");
      if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="blog-page">

<button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">🌙</button>

<nav class="site-nav">
  <div class="container nav-flex">
    <a href="index.html" class="logo">SA.</a>
    <a href="index.html" class="back-link">← Portfolio</a>
  </div>
</nav>

<main class="container">
  <header class="blog-header reveal">
    <h1>Words, Thoughts & Copy</h1>
    <p class="subtitle">Musings on clarity, conversion, and the art of persuasion.</p>
  </header>

  <section id="blog-grid" class="blog-list">
    <div class="loading">Loading thoughts...</div>
  </section>
</main>

<footer>
  <div class="container">
    <p>© 2026 Sruthi Ajith</p>
  </div>
</footer>

<script>
  /* THE REGISTRY: 
     When the client adds a new post in the CMS (e.g., 'testing.md'), 
     just add the filename (without .md) to this list.
  */
  const postSlugs = ["post1", "post2", "testing"];

  /* DYNAMIC LOADER:
     This fetches the first few lines of each markdown file 
     to build the cards automatically.
  */
  async function loadPosts() {
    const grid = document.getElementById('blog-grid');
    let htmlContent = '';

    for (const slug of postSlugs) {
      try {
        const response = await fetch(`./blog/${slug}.md`);
        if (!response.ok) continue;
        
        const text = await response.text();
        
        // Extract Title and Excerpt from Markdown or Frontmatter
        // This looks for "title: " and "excerpt: " in your MD files
        const titleMatch = text.match(/title:\s*"(.*)"/) || text.match(/title:\s*(.*)/);
        const excerptMatch = text.match(/excerpt:\s*"(.*)"/) || text.match(/excerpt:\s*(.*)/);
        
        const title = titleMatch ? titleMatch[1] : slug.replace(/-/g, ' ');
        const excerpt = excerptMatch ? excerptMatch[1] : "Click to read the full story.";

        htmlContent += `
          <article class="blog-card reveal">
            <h3>${title}</h3>
            <p>${excerpt}</p>
            <a href="post.html?post=${slug}" class="read-link">Read Post →</a>
          </article>
        `;
      } catch (err) {
        console.error(`Error loading ${slug}:`, err);
      }
    }

    grid.innerHTML = htmlContent || '<p>No posts found.</p>';
    
    // Trigger Reveal Animations
    initObserver();
  }

  /* Reveal Observer */
  function initObserver() {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { 
          entry.target.classList.add('fade-in'); 
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  }

  document.addEventListener('DOMContentLoaded', loadPosts);
</script>
<script src="js/theme.js"></script>
</body>
</html>
